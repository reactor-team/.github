name: PR Review Digest

on:
  schedule:
    # 8am CET (6am UTC) - Italy morning. Skip Saturday (day 6).
    - cron: '0 6 * * 0,1,2,3,4,5'
    # 9am PST (4pm UTC during PDT) - US morning. Skip Saturday.
    - cron: '0 16 * * 0,1,2,3,4,5'
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: reactor-team
          repositories: reactor,fluxcd

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run PR review digest
        run: python scripts/pr_review_digest.py
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPOS: "reactor-team/reactor,reactor-team/fluxcd"
